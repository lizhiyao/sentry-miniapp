<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sentry-miniapp Social Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 640px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1B1028;
    font-family: 'DM Sans', 'Noto Sans SC', sans-serif;
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 80px;
    position: relative;
    background: linear-gradient(160deg, #1B1028 0%, #231535 50%, #1B1028 100%);
  }

  .top-row {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 24px;
    z-index: 1;
  }

  .sentry-logo {
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .sentry-logo img {
    width: 64px;
    height: 64px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.9);
    padding: 4px;
    vertical-align: middle;
    transform: translateY(1px);
  }

  .title {
    font-family: 'DM Sans', sans-serif;
    font-size: 56px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: -1px;
  }

  .description {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 22px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.75);
    text-align: center;
    line-height: 1.6;
    letter-spacing: 0.5px;
    max-width: 900px;
    margin-bottom: 40px;
    z-index: 1;
  }

  .platforms {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 36px;
    z-index: 1;
  }

  .platform {
    display: flex;
    align-items: center;
    gap: 6px;
    color: rgba(255, 255, 255, 0.72);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.3px;
  }

  .platform-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .dot-wechat { background: #07C160; }
  .dot-alipay { background: #1677FF; }
  .dot-bytedance { background: #FE2C55; }
  .dot-baidu { background: #306CFF; }
  .dot-qq { background: #12B7F5; }
  .dot-dingtalk { background: #0089FF; }
  .dot-kuaishou { background: #FF4906; }
  .dot-taro { background: #0BC4B8; }

  .badges {
    display: flex;
    gap: 12px;
    z-index: 1;
  }

  .badge {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 16px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.85);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.2px;
  }

  .badge svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="top-row">
      <div class="sentry-logo">
        <img src="./docs/logo.png" alt="sentry-miniapp logo">
      </div>
      <div class="title">sentry-miniapp</div>
    </div>

    <div class="description">
      <span style="font-weight: 500; color: rgba(255,255,255,0.85)">小程序监控 SDK</span><br>
      异常监控 &bull; 性能监控 &bull; 分布式追踪
    </div>

    <div class="platforms">
      <div class="platform"><span class="platform-dot dot-wechat"></span>微信</div>
      <div class="platform"><span class="platform-dot dot-alipay"></span>支付宝</div>
      <div class="platform"><span class="platform-dot dot-bytedance"></span>字节跳动</div>
      <div class="platform"><span class="platform-dot dot-baidu"></span>百度</div>
      <div class="platform"><span class="platform-dot dot-qq"></span>QQ</div>
      <div class="platform"><span class="platform-dot dot-dingtalk"></span>钉钉</div>
      <div class="platform"><span class="platform-dot dot-kuaishou"></span>快手</div>
      <div class="platform"><span class="platform-dot dot-taro"></span>Taro / uni-app</div>
    </div>

    <div class="badges">
      <div class="badge">
        <svg viewBox="0 0 16 16"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.75.75 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25z"/></svg>
        644 Stars
      </div>
      <div class="badge">
        <svg viewBox="0 0 16 16"><path d="M1 2.5A2.5 2.5 0 0 1 3.5 0h8.75a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0V1.5h-2v6.25a.75.75 0 0 1-1.5 0V1.5H5.5a1 1 0 0 0-1 1v2.25a.75.75 0 0 1-1.5 0V2.5zM3.5 10a.75.75 0 0 1 .75.75v.5h7.5v-.5a.75.75 0 0 1 1.5 0v.5h.5a.75.75 0 0 1 0 1.5h-.5v.5a.75.75 0 0 1-1.5 0v-.5h-7.5v.5a.75.75 0 0 1-1.5 0v-.5H2a.75.75 0 0 1 0-1.5h.75v-.5A.75.75 0 0 1 3.5 10z"/></svg>
        TypeScript
      </div>
      <div class="badge">
        <svg viewBox="0 0 16 16"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25V1.75zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 9 4.25V1.5H3.75zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011z"/></svg>
        npm: sentry-miniapp
      </div>
    </div>
  </div>
</body>
</html>
